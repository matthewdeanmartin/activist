name: Demo to GitHub Pages

# Regenerates the static demo (the feed/replies the bot *would have* produced
# from the fixtures) and publishes it to GitHub Pages at /<repo>/demo/.
# out/ is gitignored, so the site is built fresh here, not committed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build the demo site
        run: uv run --frozen python scripts/build_demo.py --demo-dir site/demo

      - name: Redirect site root to the demo
        run: |
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./demo/">
          <title>activist demo</title>
          <a href="./demo/">activist demo</a>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
