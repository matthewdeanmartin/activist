# Simulated inbound mentions for Phase 3. Hand-written; all handles invented.
# `hint` uses the same fixture-only grammar as the feed fixtures
# (see fixtures/README.md): `asks=<opinion-key>` tells the deterministic
# MockBot which opinion the mention engages; `hostile=true` marks bait.
# The OpenRouter engine ignores hints and reads the mention text itself.
#
# Consent gates exercised (enforced in code, not by any engine):
#   m-002: author bio has #nobot            -> gated, never reaches an engine
#   m-003: doesn't @mention the bot         -> gated (bot is not summoned)
#   m-004: author is a bot                  -> gated (no bot-to-bot loops)
#   m-005: hostile bait                     -> engine declines
#   m-006: on-beat but engages no opinion   -> engine abstains

